version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ggvolt_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_pass_123
      POSTGRES_DB: ggvolt_dev
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [ggvolt_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: GGVolt.Server/Dockerfile
    container_name: ggvolt_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=db;Port=5432;Database=ggvolt_dev;Username=postgres;Password=dev_pass_123
      - Jwt__Issuer=GGVoltDev
      - Jwt__Audience=GGVoltClientDev
      - Jwt__Secret=DevSecretKeyMustBeAtLeast32CharactersLong!!
      - Jwt__ExpirationMinutes=60
    ports: ["5000:8080"]
    depends_on:
      db:
        condition: service_healthy
    networks: [ggvolt_net]

  minio:
    image: minio/minio:latest
    container_name: ggvolt_minio
    command: >
      server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports: [ "9000:9000", "9001:9001" ]
    volumes: [ "miniodata:/data" ]
    networks: [ ggvolt_net ]
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 3
      
  minio-init:
    image: minio/mc:latest
    container_name: ggvolt_minio_init
    depends_on: [ minio ]
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set ggvolt http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb -p ggvolt/ggvolt-content;
      /usr/bin/mc policy set download ggvolt/ggvolt-content;
      exit 0;
      "
    networks: [ ggvolt_net ]

  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: ggvolt_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ggvolt.tech
      PGADMIN_DEFAULT_PASSWORD: dev_admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports: [ "5050:80" ]
    volumes: [ "pgadmin_data:/var/lib/pgadmin" ]
    depends_on:
      db:
        condition: service_healthy
    networks: [ ggvolt_net ]
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  pgadmin_data:

networks:
  ggvolt_net:
    driver: bridge